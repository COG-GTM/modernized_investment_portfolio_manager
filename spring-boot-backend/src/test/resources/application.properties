# Test configuration
spring.application.name=investment-portfolio-manager-test

# H2 in-memory database for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# HikariCP - smaller pool for tests
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:change-me-in-production-must-be-at-least-256-bits-long-for-HS256-algorithm}
jwt.expiration=86400000
jwt.issuer=test-issuer

# Logging - quieter for tests
logging.level.com.investment.portfolio=WARN
logging.level.org.springframework.security=WARN
