# Application
spring.application.name=investment-portfolio-manager

# Database - H2 for development (PostgreSQL for production)
spring.datasource.url=jdbc:h2:mem:portfoliodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# HikariCP Connection Pool Configuration
# Matches original COBOL DB2ONLN max-connections of 100
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=10
# Connection checkout timeout (30s) - how long a thread waits for a pool connection.
# Note: The original DB2ONLN 300s timeout referred to TCP connection establishment,
# not pool checkout. HikariCP default (30s) is appropriate for web request threads.
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=InvestmentPortfolioHikariPool

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration
jwt.secret=${JWT_SECRET:change-me-in-production-must-be-at-least-256-bits-long-for-HS256-algorithm}
jwt.expiration=86400000
jwt.issuer=investment-portfolio-manager

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.investment.portfolio=INFO
logging.level.org.springframework.security=INFO
